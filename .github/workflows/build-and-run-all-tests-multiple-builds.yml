# Build and then run all tests, on all supported archs, for multiple build types
name: Build and run all tests for multiple build types

on:
  workflow_dispatch:
    inputs:
      # Release is optimized, but has all debug symbols utterly removed.
      # RelWithDebInfo is nearly as optimized, but the debug symbols aren't thrown away. In a past life the slight
      # additional optimization was inconsequential, and the ability to obtain a crash dump from the field was
      # invaluable. So in that scenario RelWithDebInfo was the hands-down winner and we pretended that Release didn't
      # exist.
      # Debug is unoptimized and has debug symbols. Unless you really need a pristine stack trace - better than
      # RelWithDebInfo's which may have a bit of reordering - then this doesn't buy you much except for slower
      # runtime. No real harm in using it when scanning the code (eg: ClangTidy), since you aren't then actually
      # running it.
      # ASan has the debug symbols, but also instruments for memory correctness and has a ~2x runtime penalty.
      # Any CI job that is "check that things are good" and don't need tight runtime tolerances can be ASan instead.
      # TSan is similar, but checks for concurrency issues. It cannot be combined with ASan, so you'll need a parallel
      # run for anything you wish to test with both. The runtime penalty of TSan is ~10x (some estimates put it higher,
      # really dependent on the nature of the code being run).
      build-types:
        description: 'Comma-separated list of build types'
        required: true
        default: '["Release", "RelWithDebInfo", "Debug", "ASan", "TSan"]'
        type: string
  pull_request:
  merge_group:
  push:
    branches: ["main"]

jobs:
  # Ensure the Docker image for CI exists. If the Dockerfile (or its
  # install scripts) changed on this branch the image is rebuilt and pushed
  # with a content-hash tag.  Otherwise the existing image is reused.
  ensure-image:
    name: Ensure Docker image
    permissions:
      packages: write
    secrets: inherit
    uses: ./.github/workflows/docker-image.yml
    with:
      docker-version: ubuntu-22.04

  # On pull_request, only Release should run. But GitHub applies the same required-status-check
  # rules to PRs and merge queues — if a check is required for merge_group it must also be
  # present on the PR. Skipped jobs count as passing, so all jobs are defined for all events
  # but their if-conditions gate which ones actually execute per event type:
  #
  #   pull_request/push:      Release
  #   merge_group:  Release, ASan, TSan
  #   workflow_dispatch: whichever build-types the caller requests
  #
  # The merge queue policy is the strictest, and is the real guard against regressions.
  # On pull requests we run only Release to get faster feedback.
  # On main we also run only Release to maintain a consistent baseline, but don't want to spend resources
  # on extensive testing at this point.

  build-release:
    name: "Build and Test (Release)"
    needs: ensure-image
    # Skipped: (none)
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'merge_group' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
      contains(fromJson(github.event.inputs['build-types']), 'Release'))
    secrets: inherit
    uses: ./.github/workflows/build-and-run-all-tests.yml
    with:
      build-type: Release
      timeout: 25
      docker-image-tag: ${{ needs.ensure-image.outputs.image-tag }}
      log-params: |
        echo build-and-run-all-tests-multiple-builds - build-types: ${{ inputs.build-types }}

  build-asan:
    name: "Build and Test (ASan)"
    needs: ensure-image
    # Skipped: pull_request, push
    if: >-
      github.event_name == 'merge_group' ||
      (github.event_name == 'workflow_dispatch' &&
      contains(fromJson(github.event.inputs['build-types']), 'ASan'))
    secrets: inherit
    uses: ./.github/workflows/build-and-run-all-tests.yml
    with:
      build-type: ASan
      timeout: 25
      docker-image-tag: ${{ needs.ensure-image.outputs.image-tag }}
      log-params: |
        echo build-and-run-all-tests-multiple-builds - build-types: ${{ inputs.build-types }}

  build-tsan:
    name: "Build and Test (TSan)"
    needs: ensure-image
    # Skipped: pull_request, push
    if: >-
      github.event_name == 'merge_group' ||
      (github.event_name == 'workflow_dispatch' &&
      contains(fromJson(github.event.inputs['build-types']), 'TSan'))
    secrets: inherit
    uses: ./.github/workflows/build-and-run-all-tests.yml
    with:
      build-type: TSan
      timeout: 50
      docker-image-tag: ${{ needs.ensure-image.outputs.image-tag }}
      log-params: |
        echo build-and-run-all-tests-multiple-builds - build-types: ${{ inputs.build-types }}

  build-relwithdebinfo:
    name: "Build and Test (RelWithDebInfo)"
    needs: ensure-image
    # Skipped: pull_request, merge_group, push
    if: >-
      github.event_name == 'workflow_dispatch' &&
      contains(fromJson(github.event.inputs['build-types']), 'RelWithDebInfo')
    secrets: inherit
    uses: ./.github/workflows/build-and-run-all-tests.yml
    with:
      build-type: RelWithDebInfo
      timeout: 25
      docker-image-tag: ${{ needs.ensure-image.outputs.image-tag }}
      log-params: |
        echo build-and-run-all-tests-multiple-builds - build-types: ${{ inputs.build-types }}

  build-debug:
    name: "Build and Test (Debug)"
    needs: ensure-image
    # Skipped: pull_request, merge_group, push
    if: >-
      github.event_name == 'workflow_dispatch' &&
      contains(fromJson(github.event.inputs['build-types']), 'Debug')
    secrets: inherit
    uses: ./.github/workflows/build-and-run-all-tests.yml
    with:
      build-type: Debug
      timeout: 50
      docker-image-tag: ${{ needs.ensure-image.outputs.image-tag }}
      log-params: |
        echo build-and-run-all-tests-multiple-builds - build-types: ${{ inputs.build-types }}
