# Build and then run all tests, on all supported archs.
name: Build and run all tests

on:
  workflow_call:
    inputs:
      build-type:
        required: true
        type: string
      timeout:
        required: true
        type: number
      docker-image-tag:
        required: false
        type: string
        default: latest
        description: >-
          Content-hash tag produced by docker-image.yml.
          When empty or unset, downstream jobs use ":latest".
      log-params:
        required: false
        type: string
        default: ""
      triggering-event:
        required: false
        type: string
        default: ""
        description: >-
          github.event_name from the top-level workflow. Used to evaluate the
          per-matrix blacklist. Leave empty for direct workflow_dispatch.
  workflow_dispatch:
    inputs:
      build-type:
        required: true
        default: Release
        type: choice
        options:
          - Release
          - RelWithDebInfo
          - Debug
          - ASan
          - TSan
      log-level:
        required: false
        default: info
        type: choice
        options:
          - info
          - debug
          - trace
      timeout:
        required: true
        description: 'The timeout for the test run in minutes'
        type: number
        default: 30

jobs:
  # Define all available cards which will be used for testing.
  cards:
    name: Define test cards
    runs-on: ubuntu-latest
    outputs:
      entries: ${{ steps.define.outputs.entries }}
    steps:
      - name: Define test card list
        id: define
        run: |
          # TODO: tt-ubuntu-2204-p100a-stable to be added when available
          # bh-gh-07 is a P300 runner
          CARDS=$(cat <<'EOF'
          [
            {"arch": "wormhole_b0", "card": "tt-ubuntu-2204-n150-stable"},
            {"arch": "wormhole_b0", "card": "tt-ubuntu-2204-n150-viommu-stable"},
            {"arch": "wormhole_b0", "card": "tt-ubuntu-2204-n300-stable"},
            {"arch": "wormhole_b0", "card": "tt-ubuntu-2204-n300-viommu-stable"},
            {"arch": "wormhole_b0", "card": "tt-ubuntu-2204-n300-llmbox-stable"},
            {"arch": "wormhole_b0", "card": "tt-ubuntu-2204-n300-llmbox-viommu-stable"},
            {"arch": "blackhole",   "card": "tt-ubuntu-2204-p100a-viommu-stable"},
            {"arch": "blackhole",   "card": "tt-ubuntu-2204-p150b-stable"},
            {"arch": "blackhole",   "card": "tt-ubuntu-2204-p150b-viommu-stable"},
            {"arch": "wormhole_b0", "card": "tt-ubuntu-2204-wh-glx-6u-stable"},
            {"arch": "wormhole_b0", "card": "tt-ubuntu-2204-wh-glx-6u-stable"},
            {"arch": "blackhole",   "card": "bh-gh-07"},
            {"arch": "blackhole",   "card": "tt-ubuntu-2204-bh-loudbox-viommu-stable"},
            {"arch": "baremetal",   "card": "ubuntu-22.04"}
          ]
          EOF
          )
          echo "entries=$(echo "$CARDS" | jq -c .)" >> $GITHUB_OUTPUT

  # Central blacklist for matrix entries that should not run under certain conditions.
  # Each entry is a pipe-delimited "triggering-event|build-type|card" triple.
  # Use "*" in the build-type field to match any build type for that event/card.
  # To extend: add entries to the echo below.
  # Note: This can also easily extend to include ubuntu-docker-version or other parameters.
  blacklist:
    name: Define test blacklist
    runs-on: ubuntu-latest
    outputs:
      entries: ${{ steps.define.outputs.entries }}
    steps:
      - name: Define blacklist entries
        id: define
        run: |
          ENTRIES=$(jq -cn '$ARGS.positional' --args \
            'pull_request|*|tt-ubuntu-2204-bh-loudbox-viommu-stable' \
            'merge_group|*|tt-ubuntu-2204-bh-loudbox-viommu-stable' \
            'pull_request|*|bh-gh-07' \
            'merge_group|ASan|bh-gh-07' \
            'merge_group|TSan|bh-gh-07' \
          )
          echo "entries=$ENTRIES" >> $GITHUB_OUTPUT

  # Generate the final test matrix by filtering the cards against the blacklist based on the triggering event.
  # This will be used for test-all job to determine which tests to run.
  generate-test-matrix:
    name: Generate filtered test matrix
    needs: [blacklist, cards]
    runs-on: ubuntu-latest
    outputs:
      test-groups: ${{ steps.filter.outputs.test-groups }}
    steps:
      - name: Filter cards against blacklist
        id: filter
        env:
          CARDS: ${{ needs.cards.outputs.entries }}
          BLACKLIST: ${{ needs.blacklist.outputs.entries }}
          TRIGGERING_EVENT: ${{ inputs.triggering-event }}
          BUILD_TYPE: ${{ inputs.build-type }}
        run: |
          FILTERED=$(echo "$CARDS" | jq -c \
            --argjson blacklist "$BLACKLIST" \
            --arg event "$TRIGGERING_EVENT" \
            --arg buildType "$BUILD_TYPE" \
            '[.[] | select(
                ($event + "|" + $buildType + "|" + .card) as $exact |
                ($event + "|*|" + .card) as $wildcard |
                ($blacklist | index($exact)) == null and
                ($blacklist | index($wildcard)) == null
            )]')
          echo "test-groups=$FILTERED" >> $GITHUB_OUTPUT
          echo "Filtered test matrix for trigger ($TRIGGERING_EVENT) build-type ($BUILD_TYPE):"
          echo "$FILTERED" | jq -r '.[] | "  \(.arch) | \(.card)"'

  build-tests:
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        ubuntu-docker-version: [
          'ubuntu-22.04',
        ]
    uses: ./.github/workflows/build-tests.yml
    with:
      ubuntu-docker-version: ${{ matrix.ubuntu-docker-version}}
      timeout: 15
      build-type: ${{ inputs.build-type }}
      build-tracy: true
      image-tag: ${{ inputs.docker-image-tag || 'latest' }}
      log-params: |
        ${{ inputs.log-params }}
        echo build-and-run-all-tests - build-type: ${{ inputs.build-type }}
        echo build-and-run-all-tests - timeout: ${{ inputs.timeout }}
        echo build-and-run-all-tests - log-level: ${{ inputs.log-level }}

  test-all:
    secrets: inherit
    needs: [build-tests, generate-test-matrix]
    strategy:
      # Cancel sibling cards on first failure only in the merge queue, where time-to-verdict
      # matters more than seeing every card's result. PR/push runs keep fail-fast off so devs
      # see whether a failure is card-specific or general.
      fail-fast: ${{ inputs.triggering-event == 'merge_group' }}
      matrix:
        test-group: ${{ fromJson(needs.generate-test-matrix.outputs.test-groups) }}
        ubuntu-docker-version: ['ubuntu-22.04']
    uses: ./.github/workflows/run-tests.yml
    with:
      arch: ${{ matrix.test-group.arch}}
      ubuntu-docker-version: ${{ matrix.ubuntu-docker-version}}
      card: ${{ matrix.test-group.card}}
      timeout: ${{ fromJSON(inputs.timeout) }}
      log-level: ${{ inputs.log-level || 'info' }}
      build-type: ${{ inputs.build-type }}
      image-tag: ${{ inputs.docker-image-tag || 'latest' }}
      log-params: |
        ${{ inputs.log-params }}
        echo build-and-run-all-tests - build-type: ${{ inputs.build-type }}
        echo build-and-run-all-tests - timeout: ${{ inputs.timeout }}
        echo build-and-run-all-tests - log-level: ${{ inputs.log-level }}

  run-ttsim-tests:
    secrets: inherit
    uses: ./.github/workflows/run-ttsim-tests.yml

  run-tooling-tests:
    secrets: inherit
    needs: build-tests
    strategy:
      fail-fast: ${{ inputs.triggering-event == 'merge_group' }}
      matrix:
        test-group: [
          {runs-on: tt-ubuntu-2204-p150b-stable},
          {runs-on: tt-ubuntu-2204-n150-stable},
          {runs-on: tt-ubuntu-2204-n300-stable},
          {runs-on: tt-ubuntu-2204-n300-llmbox-stable},
          {runs-on: 6u},
        ]
        ubuntu-docker-version: [
          'ubuntu-22.04',
        ]
    uses: ./.github/workflows/run-tooling-tests.yml
    with:
      ubuntu-docker-version: ${{ matrix.ubuntu-docker-version }}
      card: ${{ matrix.test-group.runs-on }}
      timeout: ${{ fromJSON(inputs.timeout) }}
      build-type: ${{ inputs.build-type }}
      image-tag: ${{ inputs.docker-image-tag || 'latest' }}
      log-params: |
        ${{ inputs.log-params }}
        echo build-and-run-all-tests - build-type: ${{ inputs.build-type }}
        echo build-and-run-all-tests - timeout: ${{ inputs.timeout }}

  run-exalens-tests:
    secrets: inherit
    needs: build-tests
    strategy:
      fail-fast: ${{ inputs.triggering-event == 'merge_group' }}
      matrix:
        test-group: [
          {runs-on: tt-ubuntu-2204-p150b-stable},
          {runs-on: tt-ubuntu-2204-n150-stable},
          {runs-on: tt-ubuntu-2204-n300-stable},
        ]
        ubuntu-docker-version: [
          'ubuntu-22.04',
        ]
    uses: ./.github/workflows/run-exalens-tests.yml
    with:
      ubuntu-docker-version: ${{ matrix.ubuntu-docker-version }}
      card: ${{ matrix.test-group.runs-on }}
      timeout: ${{ fromJSON(inputs.timeout) }}
      log-level: ${{ inputs.log-level || 'info' }}
      build-type: ${{ inputs.build-type }}
      log-params: |
        ${{ inputs.log-params }}
        echo build-and-run-all-tests - build-type: ${{ inputs.build-type }}
        echo build-and-run-all-tests - timeout: ${{ inputs.timeout }}
        echo build-and-run-all-tests - log-level: ${{ inputs.log-level }}

  run-tracy:
    secrets: inherit
    needs: build-tests
    uses: ./.github/workflows/run-tracy-test.yml
    with:
      ubuntu-docker-version: 'ubuntu-22.04'
      build-type: ${{ inputs.build-type }}
      timeout: 20
      image-tag: ${{ inputs.docker-image-tag || 'latest' }}

  # Fail-fast watchers for the merge queue: cancel the workflow run as soon as any test job
  # here fails. A workflow_call shares run_id with its caller, so this cancellation propagates
  # up to the sibling top-level builds (Release/ASan/TSan), giving end-to-end fail-fast.
  # One watcher per job by design — a single watcher with multi-job `needs` would wait for
  # every need to settle before evaluating `if: failure()`, defeating the purpose.
  fail-fast-build-tests:
    if: failure() && inputs.triggering-event == 'merge_group'
    needs: [build-tests]
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: action-pack/cancel@bb57491c99942855e9da36ffbe86a686b2bd35a3

  fail-fast-test-all:
    if: failure() && inputs.triggering-event == 'merge_group'
    needs: [test-all]
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: action-pack/cancel@bb57491c99942855e9da36ffbe86a686b2bd35a3

  fail-fast-ttsim:
    if: failure() && inputs.triggering-event == 'merge_group'
    needs: [run-ttsim-tests]
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: action-pack/cancel@bb57491c99942855e9da36ffbe86a686b2bd35a3

  fail-fast-tooling:
    if: failure() && inputs.triggering-event == 'merge_group'
    needs: [run-tooling-tests]
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: action-pack/cancel@bb57491c99942855e9da36ffbe86a686b2bd35a3

  fail-fast-exalens:
    if: failure() && inputs.triggering-event == 'merge_group'
    needs: [run-exalens-tests]
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: action-pack/cancel@bb57491c99942855e9da36ffbe86a686b2bd35a3

  fail-fast-tracy:
    if: failure() && inputs.triggering-event == 'merge_group'
    needs: [run-tracy]
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: action-pack/cancel@bb57491c99942855e9da36ffbe86a686b2bd35a3
