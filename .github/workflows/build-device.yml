# Builds device.
# Build is performed on all supported OS versions.
name: Build Device

on:
  workflow_dispatch:
    inputs:
      timeout:
        required: true
        description: 'The timeout for the job in minutes'
        type: number
        default: 30
  # Runs on all standard code-review and integration events: PR, merge queue, and post-merge on main.
  pull_request:
  merge_group:
  push:
    branches: ["main"]

env:
  TT_UMD_DIR: tt-umd
  # Note that $GITHUB_WORKSPACE can only be used in the shell step.
  TT_UMD_DIR_SHELL: $GITHUB_WORKSPACE/tt-umd
  CLIENTS_BUILD_DIR_SHELL: $GITHUB_WORKSPACE/build_clients
  BUILD_OUTPUT_DIR: ./build
  LIB_OUTPUT_DIR: ./build/lib
  DEPS_OUTPUT_DIR: ./build/_deps
  TEST_OUTPUT_DIR: ./build/test
  CREATE_MAP_BINARIES_DIR: ./device/bin/silicon
  INSTALL_OUTPUT_DIR: ./install
  WHEEL_OUTPUT_DIR: ./build/wheel

jobs:
  # Skips the heavy sweep on PRs (a build already runs as part of the tests) but
  # runs it on merge. Skipped on pull_request, and since the root jobs need it,
  # the skip propagates to every job that (directly or transitively) depends on
  # them. The build-device-complete leaf is the required check (always() reports
  # it).
  pr-gate:
    name: PR gate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - run: 'true'

  ensure-ubuntu-2204-image:
    name: Ensure ubuntu-22.04 Docker image
    needs: pr-gate
    permissions:
      packages: write
    secrets: inherit
    uses: ./.github/workflows/docker-image.yml
    with:
      docker-version: ubuntu-22.04

  ensure-ubuntu-2404-image:
    name: Ensure ubuntu-24.04 Docker image
    needs: pr-gate
    permissions:
      packages: write
    secrets: inherit
    uses: ./.github/workflows/docker-image.yml
    with:
      docker-version: ubuntu-24.04

  ensure-ubuntu-2404-arm-image:
    name: Ensure ubuntu-24.04-arm Docker image
    needs: pr-gate
    permissions:
      packages: write
    secrets: inherit
    uses: ./.github/workflows/docker-image.yml
    with:
      docker-version: ubuntu-24.04-arm

  ensure-fedora-39-image:
    name: Ensure fedora-39 Docker image
    needs: pr-gate
    permissions:
      packages: write
    secrets: inherit
    uses: ./.github/workflows/docker-image.yml
    with:
      docker-version: fedora-39

  ensure-manylinux-image:
    name: Ensure manylinux Docker image
    needs: pr-gate
    permissions:
      packages: write
    secrets: inherit
    uses: ./.github/workflows/docker-image.yml
    with:
      docker-version: manylinux

  ensure-manylinux-aarch64-image:
    name: Ensure manylinux-aarch64 Docker image
    needs: pr-gate
    permissions:
      packages: write
    secrets: inherit
    uses: ./.github/workflows/docker-image.yml
    with:
      docker-version: manylinux-aarch64

  ensure-riscv-image:
    name: Ensure ubuntu-24.04-riscv Docker image
    permissions:
      packages: write
    secrets: inherit
    uses: ./.github/workflows/docker-image.yml
    with:
      docker-version: ubuntu-24.04-riscv

  build:
    # Due to parsing bug, fromJSON is used to convert string to number.
    # In pull_request or push events, the input context is not available, stating the default again here.
    timeout-minutes: ${{ fromJSON(inputs.timeout || '30') }}
    needs:
      - pr-gate
      - ensure-ubuntu-2204-image
      - ensure-ubuntu-2404-image
      - ensure-ubuntu-2404-arm-image
      - ensure-fedora-39-image
    strategy:
      fail-fast: false
      matrix:
        image: [
          {distro: ubuntu-22.04, compiler-c: clang-13, compiler-cpp: clang++-13, package: deb},
          {distro: ubuntu-22.04, compiler-c: clang-20, compiler-cpp: clang++-20, package: deb},
          {distro: ubuntu-22.04, compiler-c: gcc-11, compiler-cpp: g++-11, package: deb},
          # Note: Clang-13 is obsolete on Ubuntu 24.04, we're intentionally skipping it.
          {distro: ubuntu-24.04, compiler-c: clang-20, compiler-cpp: clang++-20, package: deb},
          {distro: ubuntu-24.04, compiler-c: gcc-11, compiler-cpp: g++-11, package: deb},
          # Arm64 build, built natively on an arm runner.
          {distro: ubuntu-24.04-arm, compiler-c: clang-20, compiler-cpp: clang++-20, package: deb},
          # Note: Fedora 39 default is GCC 13, and 11 is obsolete.
          {distro: fedora-39, compiler-c: gcc-13, compiler-cpp: g++-13, package: rpm},
          # Note: Fedora 39 default is Clang 17, and it is not trivial to install clang-20.
          # Given that it's already tested out on ubuntu, version 17 is fine here.
          {distro: fedora-39, compiler-c: clang-17, compiler-cpp: clang++-17, package: rpm},
          # Release-flags builds: mirror release.yml CMake flags (TT_UMD_BUILD_SIMULATION=OFF,
          # CMAKE_BUILD_TYPE=Release) to catch clang-tidy issues before merge that would only
          # surface in the release pipeline.
          {distro: ubuntu-24.04, compiler-c: clang-20, compiler-cpp: clang++-20, package: deb, use_release_flags: true},
          {distro: fedora-39, compiler-c: clang-17, compiler-cpp: clang++-17, package: rpm, use_release_flags: true},
        ]

    name: >-
      Build device${{ matrix.image.use_release_flags && ' (release flags)' || '' }}
      on ${{ matrix.image.distro }} with ${{ matrix.image.compiler-c }}
    # Arm variants must build natively on an arm runner; everything else uses the standard x86 runner.
    runs-on: ${{ matrix.image.distro == 'ubuntu-24.04-arm' && 'ubuntu-24.04-arm' || 'ubuntu-22.04' }}
    env:
      # CI runners may lack invariant TSC support (required by Tracy for high-res timestamps).
      # This skips Tracy's runtime TSC check to prevent initialization failures during build.
      TRACY_NO_INVARIANT_CHECK: 1
    container:
      # All jobs run on GitHub-hosted runners and pull images directly from ghcr.io.
      image: >-
        ghcr.io/${{ github.repository }}/tt-umd-ci-${{
        matrix.image.distro }}:${{
        matrix.image.distro == 'ubuntu-22.04' && needs.ensure-ubuntu-2204-image.outputs.image-tag ||
        matrix.image.distro == 'ubuntu-24.04' && needs.ensure-ubuntu-2404-image.outputs.image-tag ||
        matrix.image.distro == 'ubuntu-24.04-arm' && needs.ensure-ubuntu-2404-arm-image.outputs.image-tag ||
        matrix.image.distro == 'fedora-39' && needs.ensure-fedora-39-image.outputs.image-tag ||
        'latest' }}

    steps:
      - uses: actions/checkout@v6
        with:
          # Clone under tt-umd directory
          path: ${{ env.TT_UMD_DIR }}
          submodules: recursive

      - name: Select Compiler
        run: |
          echo "CC=${{ matrix.image.compiler-c }}" >> $GITHUB_ENV
          echo "CXX=${{ matrix.image.compiler-cpp }}" >> $GITHUB_ENV
          # Add release suffix to differentiate between the jobs which should use
          # exactly the same flags the release process would use.
          RELEASE_SUFFIX="${{ matrix.image.use_release_flags && '-release' || '' }}"
          # Build ID is common suffix, differentiating packages built per distro,
          # compiler, and whether they used release cmake flags or not.
          # This suffix should be used for all package artifacts so their names
          # don't overlap for different configurations.
          # Example: PLATFORM_SUFFIX=ubuntu-24.04-clang-20-release
          PLATFORM_SUFFIX="${{ matrix.image.distro }}-${{ matrix.image.compiler-c }}${RELEASE_SUFFIX}"
          echo "PLATFORM_SUFFIX=${PLATFORM_SUFFIX}" >> $GITHUB_ENV

      # Build with all components to verify the build passes.
      # Release-flags builds mirror the flags used in release.yml to catch clang-tidy issues early.
      - name: Build All
        run: |
          cd ${{ env.TT_UMD_DIR_SHELL }}
          echo "Compiling the code..."
          if [[ "${{ matrix.image.use_release_flags }}" == "true" ]]; then
            cmake -B ${{ env.BUILD_OUTPUT_DIR }} -G Ninja \
              -DTT_UMD_BUILD_TESTS=OFF \
              -DTT_UMD_BUILD_SIMULATION=OFF \
              -DTT_UMD_BUILD_PIP=OFF \
              -DTT_UMD_BUILD_PYTHON=ON \
              -DTT_UMD_BUILD_EXAMPLES=OFF \
              -DTT_UMD_ENABLE_CLANG_TIDY=ON \
              -DCMAKE_BUILD_TYPE=Release
          else
            cmake -B ${{ env.BUILD_OUTPUT_DIR }} -G Ninja \
              -DTT_UMD_BUILD_ALL=ON \
              -DTT_UMD_BUILD_PIP=ON \
              -DTT_UMD_ENABLE_CLANG_TIDY=ON \
              -DTT_UMD_ENABLE_TRACY=ON
          fi
          cmake --build ${{ env.BUILD_OUTPUT_DIR }}
          echo "Compile complete."

      # Upload compile_commands.json for debugging and IDE integration.
      # This file contains exact compilation flags used during the build,
      # enabling developers to reproduce the analysis locally and troubleshoot issues.
      - name: Upload compile commands
        uses: actions/upload-artifact@v7
        if: always()
        with:
          # example: clang-tidy-compile-commands-ubuntu-24.04-clang-20-release
          name: clang-tidy-compile-commands-${{ env.PLATFORM_SUFFIX }}
          path: ${{ env.TT_UMD_DIR }}/build/compile_commands.json

      - name: Prepare clang-tidy config file for upload
        run: |
          chmod a+r ${{ env.TT_UMD_DIR }}/.clang-tidy
          cp ${{ env.TT_UMD_DIR }}/.clang-tidy $RUNNER_TEMP/clang-tidy-build-config

      # Upload clang-tidy configuration files to show exactly which checks were enabled/disabled.
      # Provides transparency and allows developers to use the same settings locally
      # for consistent static analysis results.
      - name: Upload clang-tidy config
        uses: actions/upload-artifact@v7
        if: always()
        with:
          # example: clang-tidy-config-ubuntu-24.04-clang-20-release
          name: clang-tidy-config-${{ env.PLATFORM_SUFFIX }}
          path: ${{ runner.temp }}/clang-tidy-build-config

      - name: Generate ${{ matrix.image.package }} package
        working-directory: ${{ env.TT_UMD_DIR }}/build
        shell: bash
        run: |
          PKG="${{ matrix.image.package }}"
          cpack -G "${PKG^^}"

      - name: Upload ${{ matrix.image.package }} dev and runtime packages
        uses: actions/upload-artifact@v7
        with:
          # example: tt-umd-packages-ubuntu-24.04-clang-20-release
          name: tt-umd-packages-${{ env.PLATFORM_SUFFIX }}
          path: |
            ${{ env.TT_UMD_DIR }}/build/*.${{ matrix.image.package }}
          if-no-files-found: error

      - name: Upload example config files
        uses: actions/upload-artifact@v7
        with:
          # example: tt-umd-examples-ubuntu-24.04-clang-20-release
          name: tt-umd-examples-${{ env.PLATFORM_SUFFIX }}
          path: |
            ${{ env.TT_UMD_DIR }}/cmake/example_client.cmake
            ${{ env.TT_UMD_DIR }}/cmake/CPM.cmake
          if-no-files-found: error

      - name: Install device library
        run: |
          cd ${{ env.TT_UMD_DIR_SHELL }}
          echo "Installing device library..."
          cmake --install ${{ env.BUILD_OUTPUT_DIR }} --prefix ${{ env.INSTALL_OUTPUT_DIR }}
          echo "Install complete."

      - name: Prepare and isolate install artifacts
        run: |
          echo "Preparing and isolating install artifacts..."
          mkdir ${{ env.CLIENTS_BUILD_DIR_SHELL }}
          cd ${{ env.CLIENTS_BUILD_DIR_SHELL }}
          echo "Copying install artifacts..."
          cp -r ${{ env.TT_UMD_DIR_SHELL }}/${{ env.INSTALL_OUTPUT_DIR }} \
             ${{ env.CLIENTS_BUILD_DIR_SHELL }}/umd_install
          echo "Copying cmake example config file..."
          mkdir -p ${{ env.CLIENTS_BUILD_DIR_SHELL }}/cmake
          cp ${{ env.TT_UMD_DIR_SHELL }}/cmake/example_client.cmake \
             ${{ env.CLIENTS_BUILD_DIR_SHELL }}/cmake/example_client.cmake
          cp ${{ env.TT_UMD_DIR_SHELL }}/cmake/CPM.cmake ${{ env.CLIENTS_BUILD_DIR_SHELL }}/cmake/CPM.cmake
          echo "Copying components to build..."
          cp -r ${{ env.TT_UMD_DIR_SHELL }}/examples ${{ env.CLIENTS_BUILD_DIR_SHELL }}/examples
          cp -r ${{ env.TT_UMD_DIR_SHELL }}/nanobind ${{ env.CLIENTS_BUILD_DIR_SHELL }}/nanobind
          cp -r ${{ env.TT_UMD_DIR_SHELL }}/tools ${{ env.CLIENTS_BUILD_DIR_SHELL }}/tools
          echo "Preparation complete."
          pwd
          ls -laR ${{ env.CLIENTS_BUILD_DIR_SHELL }}

      - name: Build examples as standalone
        run: |
          cd ${{ env.CLIENTS_BUILD_DIR_SHELL }}/examples
          cmake -B build -G Ninja -DCMAKE_PREFIX_PATH=../umd_install
          cmake --build build

      - name: Build nanobind as standalone
        run: |
          cd ${{ env.CLIENTS_BUILD_DIR_SHELL }}/nanobind
          cmake -B build -G Ninja -DCMAKE_PREFIX_PATH=../umd_install
          cmake --build build

      - name: Build tools as standalone
        run: |
          cd ${{ env.CLIENTS_BUILD_DIR_SHELL }}/tools
          cmake -B build -G Ninja -DCMAKE_PREFIX_PATH=../umd_install
          cmake --build build

      - name: Rebuild package for python without wheel
        run: |
          cd ${{ env.TT_UMD_DIR_SHELL }}
          echo "Recompiling the code..."
          cmake -B ${{ env.BUILD_OUTPUT_DIR }} -G Ninja \
            -DTT_UMD_BUILD_ALL=ON \
            -DTT_UMD_BUILD_PIP=OFF \
            -DENABLE_CLANG_TIDY=ON
          cmake --build ${{ env.BUILD_OUTPUT_DIR }}
          echo "Compile complete."

      - name: Generate ${{ matrix.image.package }} package for umd-python
        working-directory: ${{ env.TT_UMD_DIR }}/build
        shell: bash
        run: |
          PKG="${{ matrix.image.package }}"
          cpack -G "${PKG^^}"

      - name: Upload ${{ matrix.image.package }} packages for umd-python
        uses: actions/upload-artifact@v7
        with:
          # example: tt-umd-python-ubuntu-24.04-clang-20-release
          name: tt-umd-python-${{ env.PLATFORM_SUFFIX }}
          path: |
            ${{ env.TT_UMD_DIR }}/build/*umd-python*.${{ matrix.image.package }}
          if-no-files-found: error

  build-riscv-emulated:
    # Emulated riscv64 build. A riscv64 image can't be used as a job `container:`
    # on an x86 runner (GitHub pulls it as linux/amd64 and fails), so this runs on
    # a plain x86 runner, registers QEMU/binfmt, and builds inside the image via
    # `docker run --platform linux/riscv64`. Build-only.
    timeout-minutes: 60
    needs: ensure-riscv-image
    permissions:
      packages: read
    name: Build device (release flags) on ubuntu-24.04-riscv with gcc
    runs-on: tt-ubuntu-2204-large-stable

    steps:
      - uses: actions/checkout@v6
        with:
          path: ${{ env.TT_UMD_DIR }}
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build All
        shell: bash
        run: |
          IMAGE_TAG="${{ needs.ensure-riscv-image.outputs.image-tag }}"
          IMAGE="ghcr.io/${{ github.repository }}/tt-umd-ci-ubuntu-24.04-riscv:${IMAGE_TAG}"
          echo "Building inside $IMAGE under QEMU (linux/riscv64)..."
          # Release flags (tests off -> no gtest), executed natively inside the
          # emulated riscv64 image.
          docker run --rm --platform linux/riscv64 \
            -v "$GITHUB_WORKSPACE/${{ env.TT_UMD_DIR }}:/work" -w /work \
            "$IMAGE" \
            bash -c '
              set -euo pipefail
              git config --global --add safe.directory "*"
              cmake -B ${{ env.BUILD_OUTPUT_DIR }} -G Ninja \
                -DTT_UMD_BUILD_TESTS=OFF \
                -DTT_UMD_BUILD_SIMULATION=OFF \
                -DTT_UMD_BUILD_PIP=OFF \
                -DTT_UMD_BUILD_PYTHON=ON \
                -DTT_UMD_BUILD_EXAMPLES=OFF \
                -DTT_UMD_ENABLE_CLANG_TIDY=ON \
                -DCMAKE_BUILD_TYPE=Release
              cmake --build ${{ env.BUILD_OUTPUT_DIR }}
              echo "Compile complete."
            '

  build-manylinux-wheels:
    # Due to parsing bug, fromJSON is used to convert string to number.
    # In pull_request or push events, the input context is not available, stating the default again here.
    timeout-minutes: ${{ fromJSON(inputs.timeout || '30') }}
    needs: [pr-gate, ensure-manylinux-image, ensure-manylinux-aarch64-image]
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]

    name: Build umd manylinux wheel (${{ matrix.arch }})
    # aarch64 wheels build natively on an arm runner (no QEMU emulation needed).
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-22.04' }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build manylinux wheels
        shell: bash
        env:
          # Only build wheels for the runner's native architecture.
          CIBW_ARCHS: ${{ matrix.arch }}
          # Use custom manylinux Docker images with all dependencies pre-installed.
          # cibuildwheel picks the image matching the architecture being built.
          CIBW_MANYLINUX_X86_64_IMAGE: >-
            ghcr.io/${{ github.repository }}/tt-umd-ci-manylinux:${{
            needs.ensure-manylinux-image.outputs.image-tag }}
          CIBW_MANYLINUX_AARCH64_IMAGE: >-
            ghcr.io/${{ github.repository }}/tt-umd-ci-manylinux-aarch64:${{
            needs.ensure-manylinux-aarch64-image.outputs.image-tag }}
          # This command will be executed for each wheel build to verify that the wheel is functional.
          CIBW_TEST_COMMAND: 'python -c "import tt_umd"'
        run: |
          echo "Cleaning up wheel directory in case of previous build..."
          rm -rf ${{ env.WHEEL_OUTPUT_DIR }}
          mkdir -p ${{ env.WHEEL_OUTPUT_DIR }}
          echo "Building manylinux wheel..."
          python -m cibuildwheel --output-dir ${{ env.WHEEL_OUTPUT_DIR }}
          echo "Build complete."

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: manylinux-wheel-artifact-${{ matrix.arch }}
          path: |
            ${{ env.WHEEL_OUTPUT_DIR }}

  test-packages:
    needs: [pr-gate, build, ensure-ubuntu-2204-image, ensure-ubuntu-2404-image, ensure-fedora-39-image]
    timeout-minutes: ${{ fromJSON(inputs.timeout || '30') }}
    strategy:
      fail-fast: false
      matrix:
        build: [
          {package: deb, distro: ubuntu-22.04, compiler-c: gcc-11},
          {package: deb, distro: ubuntu-24.04, compiler-c: gcc-11},
          {package: rpm, distro: fedora-39, compiler-c: gcc-13}
        ]

    name: Test ${{ matrix.build.package }} package on ${{ matrix.build.distro }} with ${{ matrix.build.compiler-c }}
    runs-on: ubuntu-22.04
    container:
      image: >-
        ghcr.io/${{ github.repository }}/tt-umd-ci-${{ matrix.build.distro }}:${{
        matrix.build.distro == 'ubuntu-22.04' && needs.ensure-ubuntu-2204-image.outputs.image-tag ||
        matrix.build.distro == 'ubuntu-24.04' && needs.ensure-ubuntu-2404-image.outputs.image-tag ||
        needs.ensure-fedora-39-image.outputs.image-tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          path: tt-umd
          submodules: recursive

      - name: Set Build ID
        run: |
          # Note that BUILD ID doesn't include the option with the -release suffix
          # as the above matrix which builds packages. We test only one variant.
          echo "PLATFORM_SUFFIX=${{ matrix.build.distro }}-${{ matrix.build.compiler-c }}" >> $GITHUB_ENV

      - name: Download Packages Artifact
        uses: actions/download-artifact@v8
        with:
          # example: tt-umd-packages-ubuntu-24.04-clang-20
          name: tt-umd-packages-${{ env.PLATFORM_SUFFIX }}
          path: ./downloaded-artifact/tt-umd-packages-${{ env.PLATFORM_SUFFIX }}-package

      - name: Download Examples Artifact
        uses: actions/download-artifact@v8
        with:
          # example: tt-umd-examples-ubuntu-24.04-clang-20
          name: tt-umd-examples-${{ env.PLATFORM_SUFFIX }}
          path: ./downloaded-artifact/tt-umd-examples-${{ env.PLATFORM_SUFFIX }}-example

      - name: Download Python Packages Artifact
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          # example: tt-umd-python-ubuntu-24.04-clang-20
          name: tt-umd-python-${{ env.PLATFORM_SUFFIX }}
          path: ./downloaded-artifact/tt-umd-python-${{ env.PLATFORM_SUFFIX }}-package

      - name: Run test on example and python with packages
        shell: bash
        run: |
          set -euo pipefail
          PKG_FMT="${{ matrix.build.package }}"

          # Directories from downloaded artifacts
          PACKAGE_DIR="./downloaded-artifact/tt-umd-packages-${PLATFORM_SUFFIX}-package"
          PY_PACKAGE_DIR="./downloaded-artifact/tt-umd-python-${PLATFORM_SUFFIX}-package"
          EXAMPLE_DIR="./downloaded-artifact/tt-umd-examples-${PLATFORM_SUFFIX}-example"

          echo "Install .${PKG_FMT} packages from ${PACKAGE_DIR}"
          DEV_PKG="$(find "${PACKAGE_DIR}" -maxdepth 1 -type f \
            -name "tt_umd-*-Linux-umd-dev.${PKG_FMT}" -print -quit)"
          RUNTIME_PKG="$(find "${PACKAGE_DIR}" -maxdepth 1 -type f \
            -name "tt_umd-*-Linux-umd-runtime.${PKG_FMT}" -print -quit)"
          PYTHON_PKG="$(find "${PY_PACKAGE_DIR}" -maxdepth 1 -type f \
            -name "tt_umd-*-Linux-umd-python.${PKG_FMT}" -print -quit || true)"

          if [ -z "${DEV_PKG}" ] || [ -z "${RUNTIME_PKG}" ]; then
            echo "Required packages not found in ${PACKAGE_DIR}"
            exit 1
          fi

          if [ "${PKG_FMT}" = "deb" ]; then
            apt update
            if [ -n "${PYTHON_PKG}" ]; then
              apt install -y "${DEV_PKG}" "${RUNTIME_PKG}" "${PYTHON_PKG}"
            else
              apt install -y "${DEV_PKG}" "${RUNTIME_PKG}"
            fi
          else
            if [ -n "${PYTHON_PKG}" ]; then
              dnf install -y "${DEV_PKG}" "${RUNTIME_PKG}" "${PYTHON_PKG}"
            else
              dnf install -y "${DEV_PKG}" "${RUNTIME_PKG}"
            fi
          fi

          echo "Copy UMD examples"
          mkdir -p ./example_test
          cp -r ./tt-umd/examples/* ./example_test

          echo "Copy CMake configuration"
          mkdir -p ./cmake
          cp "${EXAMPLE_DIR}"/* ./cmake

          echo "Build UMD examples (which are dependent on libtt-umd.so)"
          cd ./example_test
          cmake -B build -G Ninja
          cmake --build ./build

          # Sanity check Python import if the package is installed
          if [ "${PKG_FMT}" = "deb" ]; then
            CHECK_CMD="dpkg -s tt_umd-umd-python"
          else
            CHECK_CMD="rpm -q tt_umd-umd-python"
          fi
          if ${CHECK_CMD} >/dev/null 2>&1; then
            echo "Run Python import test for FHS-installed module"
            python3 -c "import tt_umd; print('Python import tt_umd: OK')"
          else
            echo "ERROR: Python package not found! Test skipped improperly."
            exit 1  # Force CI failure
          fi

  # Single leaf check to require in branch protection. Treats skipped jobs as
  # passing (expected on pull_request), fails on any failure or cancellation.
  # All jobs are listed so a failure can't hide behind a skipped dependent.
  build-device-complete:
    name: All builds passed
    runs-on: ubuntu-latest
    needs:
      - pr-gate
      - ensure-ubuntu-2204-image
      - ensure-ubuntu-2404-image
      - ensure-ubuntu-2404-arm-image
      - ensure-fedora-39-image
      - ensure-manylinux-image
      - ensure-manylinux-aarch64-image
      - build
      - build-manylinux-wheels
      - test-packages
    if: always()
    steps:
      - name: Check no job failed or was cancelled
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "Results: ${results}"
          for r in $results; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "A required job failed or was cancelled."
              exit 1
            fi
          done
