# Build tt-exalens test kernels and package the FULL tt-exalens tree (source + build outputs)
# into a single artifact. Consumers (run-exalens-tests.yml) run against exactly this checkout,
# so there is no second `ref: main` checkout that could drift to a different commit.
# The kernels are build-type-independent (plain `make`/`make wheel`), so one build serves every
# build-type - callers that fan out over build-types build this once and share the artifact.
name: Build tt-exalens kernels

on:
  workflow_call:
    inputs:
      ubuntu-docker-version:
        required: false
        type: string
        default: ubuntu-22.04

jobs:
  build-exalens-kernels:
    name: Build tt-exalens kernels for tests
    timeout-minutes: 10
    runs-on: ubuntu-22.04
    container:
      # Use tt-exalens own CI image as it has everything pre-installed.
      image: ghcr.io/tenstorrent/tt-exalens/tt-exalens-ci-${{ inputs.ubuntu-docker-version }}:latest

    steps:
      - uses: actions/checkout@v6
        with:
          repository: tenstorrent/tt-exalens
          ref: main
          submodules: recursive

      - name: Build native code and test kernels
        run: |
          make

      - name: Build wheel
        run: |
          make wheel

      # SFPI moved from build/sfpi to build_riscv/sfpi as of tt-exalens #1053.
      - name: Trim SFPI toolchain from build artifacts (keep GDB only)
        run: |
          mv build_riscv/sfpi build_riscv/sfpi_backup
          mkdir -p build_riscv/sfpi/compiler/bin/
          cp build_riscv/sfpi_backup/compiler/bin/riscv-tt-elf-gdb build_riscv/sfpi/compiler/bin/riscv-tt-elf-gdb
          rm -rf build_riscv/sfpi_backup
          rm -f build_riscv/sfpi_*

      - name: Prepare artifact layout for tests
        run: |
          rm -rf build
          mkdir build
          ln -s ../build_riscv build/riscv-src

      # Package the entire tt-exalens tree (source + build outputs) into a single tar. tar
      # preserves the build/riscv-src symlink and file permissions; --exclude-vcs drops the
      # .git dirs of the repo and every recursive submodule to keep the artifact lean.
      - name: Package tt-exalens source and build outputs
        shell: bash
        run: |
          tar cvf ttexalens-artifact.tar --exclude-vcs --exclude=./ttexalens-artifact.tar .

      - name: Upload tt-exalens artifact
        uses: actions/upload-artifact@v7
        with:
          name: ttexalens-build-${{ inputs.ubuntu-docker-version }}
          path: ttexalens-artifact.tar
