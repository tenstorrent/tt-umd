# Builds umd_tests.
name: Build Target

on:
  workflow_call:
    inputs:
      ubuntu-docker-version:
        required: true
        type: string
      timeout:
        required: false
        type: number
        default: 30
        description: >-
          Build job timeout in minutes. Defaults to 30, sized for the
          github-hosted runners. Callers only set this to override.
      build-type:
        required: true
        type: string
        default: Release
      build-targets:
        required: false
        type: string
        default: "umd_tests umd_microbenchmark umd_tools"
        description: >-
          Space-separated list of CMake targets to build.
      log-params:
        required: false
        type: string
        default: ""
      build-wheel:
        required: false
        type: boolean
        default: true
      build-tracy:
        required: false
        type: boolean
        default: false
        description: >-
          When true, the build job runs an additional matrix entry with
          TT_UMD_ENABLE_TRACY=ON. The Tracy artifact uses a -tracy suffix.
      image-tag:
        required: false
        type: string
        default: latest
        description: 'Content-hash tag from docker-image.yml. Defaults to latest.'
  workflow_dispatch:
    inputs:
      ubuntu-docker-version:
        required: true
        description: 'The version of Ubuntu to build on'
        type: choice
        options:
          - ubuntu-22.04
          - ubuntu-24.04
      timeout:
        required: true
        description: 'The timeout for the build job in minutes'
        type: number
      build-type:
        required: true
        default: Release
        type: choice
        options:
          - Release
          - RelWithDebInfo
          - Debug
          - ASan
          - TSan
      build-tracy:
        required: false
        description: 'Also build a Tracy-enabled variant'
        type: boolean
        default: false


env:
  CC: clang-20
  CXX: clang++-20
  BUILD_TARGETS: "umd_tests umd_microbenchmark umd_tools"
  BUILD_OUTPUT_DIR: ./build
  LIB_OUTPUT_DIR: ./build/lib
  DEPS_OUTPUT_DIR: ./build/_deps
  TEST_OUTPUT_DIR: ./build/test
  TOOLS_OUTPUT_DIR: ./build/tools
  WHEEL_OUTPUT_DIR: ./build/wheel
  CLUSTER_DESCRIPTORS_DIR: ./tests/cluster_descriptor_examples
  SOC_DESCRIPTORS_DIR: ./tests/soc_descs
  NANOBIND_TEST_DIR: ./nanobind/tests

jobs:
  build:
    name: >-
      Build (${{ inputs.build-type }},
      ${{ inputs.ubuntu-docker-version }}${{ matrix.use_tracy && ', tracy' || '' }})
    # Due to parsing bug, fromJSON is used to convert string to number
    timeout-minutes: ${{ fromJSON(inputs.timeout) }}

    strategy:
      fail-fast: false
      # When build-tracy is true, the matrix expands to two jobs: one regular and one Tracy-enabled.
      # When false (default), only the regular build runs - so existing callers see no behavior change.
      matrix:
        use_tracy: ${{ fromJSON(inputs.build-tracy && '[false, true]' || '[false]') }}

    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/${{ github.repository }}/tt-umd-ci-${{ inputs.ubuntu-docker-version }}:${{ inputs.image-tag }}

    env:
      # CI runners may lack invariant TSC support (required by Tracy for high-res timestamps).
      # This skips Tracy's runtime TSC check; harmless when Tracy is disabled.
      TRACY_NO_INVARIANT_CHECK: 1

    steps:
      - name: Print all params
        run: |
          ${{ inputs.log-params }}
          echo build-tests - ubuntu-docker-version: ${{ inputs.ubuntu-docker-version }}
          echo build-tests - timeout: ${{ inputs.timeout }}
          echo build-tests - build-type: ${{ inputs.build-type }}
          echo build-tests - use_tracy: ${{ matrix.use_tracy }}

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # Only perform build with necessary components to run tests.
      - name: Build ${{ inputs.build-targets || env.BUILD_TARGETS }}
        run: |
          echo "Compiling the code..."
          cmake -B ${{ env.BUILD_OUTPUT_DIR }} -G Ninja \
            -DTT_UMD_BUILD_TESTS=ON \
            -DTT_UMD_BUILD_SIMULATION=OFF \
            -DTT_UMD_BUILD_PYTHON=OFF \
            -DTT_UMD_BUILD_EXAMPLES=OFF \
            -DTT_UMD_BUILD_TOOLS=ON \
            -DTT_UMD_ENABLE_CLANG_TIDY=OFF \
            -DTT_UMD_ENABLE_TRACY=${{ matrix.use_tracy && 'ON' || 'OFF' }} \
            -DTT_UMD_ENABLE_LOGGING=${{ secrets.ACTIONS_RUNNER_DEBUG == 'true' && 'ON' || 'OFF' }} \
            -DCMAKE_BUILD_TYPE=${{ inputs.build-type || 'Release' }}
          cmake --build ${{ env.BUILD_OUTPUT_DIR }} --target ${{ inputs.build-targets || env.BUILD_TARGETS }}
          echo "Compile complete."

      # This is needed to preserve file permissions
      # https://github.com/actions/upload-artifact?tab=readme-ov-file#permission-loss
      - name: Tar build, test and run artifacts
        shell: bash
        run: |
          tar cvf artifact.tar ${{ env.TEST_OUTPUT_DIR }} \
          ${{ env.TOOLS_OUTPUT_DIR }} \
          ${{ env.LIB_OUTPUT_DIR }} \
          ${{ env.DEPS_OUTPUT_DIR }} \
          ${{ env.CLUSTER_DESCRIPTORS_DIR }} \
          ${{ env.SOC_DESCRIPTORS_DIR }}

      - name: Upload build artifacts archive
        uses: actions/upload-artifact@v7
        with:
          name: >-
            build-artifacts-${{ inputs.ubuntu-docker-version
            }}-${{ inputs.build-type }}${{ matrix.use_tracy && '-tracy' || '' }}
          path: artifact.tar

  build-wheel:
    if: inputs.build-wheel
    # Due to parsing bug, fromJSON is used to convert string to number
    timeout-minutes: ${{ fromJSON(inputs.timeout) }}

    name: Build umd wheel on ${{ inputs.ubuntu-docker-version }}
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/${{ github.repository }}/tt-umd-ci-${{ inputs.ubuntu-docker-version }}:${{ inputs.image-tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build wheel
        shell: bash
        run: |
          echo "Cleaning up wheel directory in case of previous build..."
          rm -rf ${{ env.WHEEL_OUTPUT_DIR }}
          mkdir -p ${{ env.WHEEL_OUTPUT_DIR }}
          echo "Setting up virtual environment..."
          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip wheel auditwheel
          echo "Compiling the code..."
          # Override CMAKE_BUILD_TYPE to Release for sanitizer builds to avoid symbol conflicts with Python
          # Python interpreters are not built with sanitizers, so TSAN/ASAN wheels cannot be loaded
          BUILD_TYPE="${{ inputs.build-type }}"
          if [[ "$BUILD_TYPE" == "ASan" || "$BUILD_TYPE" == "TSan" ]]; then
            echo "Overriding CMAKE_BUILD_TYPE from $BUILD_TYPE to Release for Python wheel compatibility"
            WHEEL_BUILD_TYPE="Release"
          else
            echo "Using CMAKE_BUILD_TYPE=$BUILD_TYPE for Python wheel"
            WHEEL_BUILD_TYPE="$BUILD_TYPE"
          fi
          CMAKE_BUILD_TYPE="$WHEEL_BUILD_TYPE" python -m pip wheel . --wheel-dir ${{ env.WHEEL_OUTPUT_DIR }} -v

          # This is done so that all the necessary libraries are included in the wheel.
          # Specifically, this will make the wheel runnable on exalens ci image.
          echo "Repairing wheel with auditwheel..."
          WHL_PATH=$(ls ${{ env.WHEEL_OUTPUT_DIR }}/*.whl)
          auditwheel -v repair "$WHL_PATH" -w ${{ env.WHEEL_OUTPUT_DIR }}
          rm "$WHL_PATH"
          echo "Compile complete."

      - name: Move python bindings tests in the same wheel folder
        run: |
          cp -r ${{ env.NANOBIND_TEST_DIR }} ${{ env.WHEEL_OUTPUT_DIR }}/tests

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          # Note that wheel is built with hardcoded Release build type at the moment.
          name: wheel-artifact-${{ inputs.ubuntu-docker-version }}-${{ inputs.build-type }}
          path: ${{ env.WHEEL_OUTPUT_DIR }}

  build-exalens-kernels:
    name: Build tt-exalens kernels for tests
    timeout-minutes: 5
    runs-on: ubuntu-22.04
    container:
      # Use tt-exalens own CI image as it has everything pre-installed.
      image: ghcr.io/tenstorrent/tt-exalens/tt-exalens-ci-${{ inputs.ubuntu-docker-version }}:latest

    env:
      # Clear the workflow-level CC/CXX (clang-20): that toolchain only exists in the
      # tt-umd image.
      CC: ""
      CXX: ""

    steps:
      - uses: actions/checkout@v6
        with:
          repository: tenstorrent/tt-exalens
          ref: main
          submodules: recursive

      - name: Build native code and test kernels
        run: |
          make

      - name: Build wheel
        run: |
          make wheel

      # SFPI moved from build/sfpi to build_riscv/sfpi as of tt-exalens #1053.
      - name: Trim SFPI toolchain from build artifacts (keep GDB only)
        run: |
          mv build_riscv/sfpi build_riscv/sfpi_backup
          mkdir -p build_riscv/sfpi/compiler/bin/
          cp build_riscv/sfpi_backup/compiler/bin/riscv-tt-elf-gdb build_riscv/sfpi/compiler/bin/riscv-tt-elf-gdb
          rm -rf build_riscv/sfpi_backup
          rm -f build_riscv/sfpi_*

      - name: Prepare artifact layout for tests
        run: |
          rm -rf build
          mkdir build
          ln -s ../build_riscv build/riscv-src

      - name: Upload kernels as artifacts
        uses: pyTooling/upload-artifact@v1.10.0
        with:
          name: ttexalens-build-${{ inputs.ubuntu-docker-version }}-${{ inputs.build-type }}
          path: |
            build
            build_riscv
            build_wheel
            ttexalens/_native_ttexalens*.so
            ttexalens/_native_ttexalens/__init__.pyi
