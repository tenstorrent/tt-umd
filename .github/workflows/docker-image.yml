# Ensure the CI Docker image for a given variant exists in ghcr.io.
# Computes a content-hash of the Dockerfile + shared install scripts and
# builds/pushes the image only when that tag is missing from the registry.
name: Ensure Docker Image

on:
  workflow_call:
    inputs:
      docker-version:
        required: true
        type: string
        description: >-
          Image variant name that matches the Dockerfile prefix,
          e.g. "ubuntu-22.04", "ubuntu-24.04", "fedora-39", "manylinux".
      timeout:
        required: false
        type: number
        default: 20
    outputs:
      image-tag:
        description: >-
          The content-hash tag for the Docker image
          (e.g. "sha-abc123def456").
        value: ${{ jobs.ensure.outputs.image-tag }}

jobs:
  ensure:
    name: Ensure image (${{ inputs.docker-version }})
    # Arm variants (-arm / -aarch64 suffix) must be built natively on an arm runner.
    runs-on: >-
      ${{ (endsWith(inputs.docker-version, '-arm') || endsWith(inputs.docker-version, '-aarch64'))
      && 'ubuntu-24.04-arm' || 'ubuntu-22.04' }}
    timeout-minutes: ${{ fromJSON(inputs.timeout) }}
    permissions:
      packages: write
    outputs:
      image-tag: ${{ steps.hash.outputs.tag }}

    steps:
      - uses: actions/checkout@v6

      - name: Compute content hash
        id: hash
        run: |
          DOCKERFILE=".github/${{ inputs.docker-version }}.Dockerfile"

          # Collect the Dockerfile itself plus any scripts it COPYs
          FILES="$DOCKERFILE"
          for script in $(grep -oP '(?<=COPY )\S+\.sh' "$DOCKERFILE" || true); do
            FILES="$FILES .github/$script"
          done

          echo "Hashing files: $FILES"
          HASH=$(cat $FILES | sha256sum | cut -c1-12)
          TAG="sha-${HASH}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Computed tag: $TAG"

      - name: Set image name
        run: |
          echo "CI_IMAGE=ghcr.io/${{ github.repository }}/tt-umd-ci-${{ inputs.docker-version }}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists
        id: check
        run: |
          if docker manifest inspect "$CI_IMAGE:${{ steps.hash.outputs.tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image $CI_IMAGE:${{ steps.hash.outputs.tag }} already exists, skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image $CI_IMAGE:${{ steps.hash.outputs.tag }} not found, will build."
          fi

      - name: Set up QEMU
        # Emulated (non-native arch) image builds, e.g. the riscv64 image, need
        # QEMU/binfmt so their rootfs RUN steps run on the x86 builder.
        if: steps.check.outputs.exists == 'false' && inputs.docker-version == 'ubuntu-24.04-riscv'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .github
          file: .github/${{ inputs.docker-version }}.Dockerfile
          push: true
          # Emulated riscv64 image is built for linux/riscv64. Everything else
          # uses an empty value, which build-push-action treats as "the builder's
          # native platform" -- correct here since the ensure job runs on x86 or
          # arm runners depending on the variant. Hardcoding a platform would
          # break the native aarch64 image build.
          platforms: ${{ inputs.docker-version == 'ubuntu-24.04-riscv' && 'linux/riscv64' || '' }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.CI_IMAGE }}:${{ steps.hash.outputs.tag }}
          cache-from: type=registry,ref=${{ env.CI_IMAGE }}:latest

      # Update :latest when merging to main so manual/external consumers
      # always get the most recent image.
      - name: Tag as latest on main
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker buildx imagetools create \
            --tag "$CI_IMAGE:latest" \
            "$CI_IMAGE:${{ steps.hash.outputs.tag }}"
