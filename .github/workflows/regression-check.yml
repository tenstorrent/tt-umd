# Regression check against in-repo per-arch baseline YAMLs.
# Complementary to analyze_results.yml (which diffs current run vs the single
# latest main run). This workflow compares against the median of N main runs
# stored in tests/microbenchmark/expected/baselines/<arch>.yaml, applies
# per-case tolerances, and emits a coarse cross-arch summary plus per-(test,
# arch) detail sections to $GITHUB_STEP_SUMMARY.
#
# Pilot: soft by default, but can hard-fail when gate: true breaches.
name: Regression check against in-repo baseline

on:
  workflow_call:
    # No inputs — downloads benchmark-json-* artifacts from the parent run.

env:
  RESULTS_DIR: /tmp/all-arch-results
  SUMMARY_PATH: /tmp/regression_summary.md

jobs:
  regression-check:
    name: Regression summary vs per-arch baselines
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read   # actions/checkout
      packages: read   # pull ghcr.io container image
      actions: read    # actions/download-artifact API access
    container:
      image: ghcr.io/${{ github.repository }}/tt-umd-ci-ubuntu-24.04:latest

    steps:
      - name: Checkout regression tooling
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            tests/microbenchmark/expected/baselines/
            tests/microbenchmark/tools/summarize_regressions.py
            tests/microbenchmark/tools/analyze_results.py
          sparse-checkout-cone-mode: false

      # Container is Ubuntu 24.04 (PEP 668-enforced); install into a venv to
      # match the pattern in analyze_results.yml.
      - name: Install python3-venv
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends python3-venv

      - name: Create and activate virtual environment
        run: |
          python3 -m venv /tmp/venv
          . /tmp/venv/bin/activate
          echo "PATH=$PATH" >> $GITHUB_ENV
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV

      - name: Install python dependencies
        run: |
          . /tmp/venv/bin/activate
          python3 -m pip install --no-cache-dir pandas psutil pyyaml tabulate

      - name: Download all benchmark JSON artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: benchmark-json-*
          path: ${{ env.RESULTS_DIR }}
          merge-multiple: false
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize artifact layout
        # actions/download-artifact@v8 with merge-multiple:false drops the
        # contents directly into RESULTS_DIR when only one artifact matches the
        # pattern, instead of into RESULTS_DIR/<artifact-name>/ as the loader
        # expects. Re-wrap into a per-artifact subdir using the artifact name
        # we already know from the upload step (run-benchmarks.yml). The shell
        # is the regression-check container, so paths are local.
        shell: bash
        run: |
          cd "${RESULTS_DIR}"
          # Multi-artifact case (full matrix): subdirs already exist. No-op.
          # Single-artifact case (first-iteration n150 only): JSONs are at root.
          if compgen -G "*.json" > /dev/null; then
            SUBDIR="benchmark-json-wormhole_b0-tt-ubuntu-2204-n150-viommu-stable-ubuntu-22.04"
            mkdir -p "$SUBDIR"
            mv ./*.json "$SUBDIR/"
            echo "wrapped single-artifact contents into $SUBDIR/"
          fi
          ls -la

      - name: Summarize regressions
        run: |
          . /tmp/venv/bin/activate
          # Capture exit code without aborting — summarize_regressions.py exits 1
          # when a gated case breaches, but we still want the step summary and
          # log output published before the step fails.
          set +e
          python3 tests/microbenchmark/tools/summarize_regressions.py \
            --current "${RESULTS_DIR}" \
            --baselines-dir tests/microbenchmark/expected/baselines \
            --output "${SUMMARY_PATH}"
          rc=$?
          set -e
          if [ -f "${SUMMARY_PATH}" ]; then
            cat "${SUMMARY_PATH}" >> "${GITHUB_STEP_SUMMARY}"
            echo "----- regression summary -----"
            cat "${SUMMARY_PATH}"
          fi
          exit "${rc}"

      - name: Upload regression summary artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-summary
          path: ${{ env.SUMMARY_PATH }}
          if-no-files-found: warn
