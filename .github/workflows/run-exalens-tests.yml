# Run exalens tests on the specified architecture and card.
name: Run Exalens Tests

on:
  workflow_call:
    inputs:
      ubuntu-docker-version:
        required: true
        type: string
      card:
        required: true
        type: string
      timeout:
        required: true
        type: number
      build-type:
        required: true
        type: string
        default: Release
      log-level:
        required: false
        type: string
        default: 'info'
      log-params:
        required: false
        type: string
        default: ""

env:
  WHEEL_ARTIFACT_NAME: wheel-artifact-${{ inputs.ubuntu-docker-version }}-${{ inputs.build-type }}

jobs:
  test:
    name: Run Exalens (${{ inputs.card }}, ${{ inputs.build-type }}, ${{ inputs.ubuntu-docker-version }})
    timeout-minutes: ${{ fromJSON(inputs.timeout) }}
    runs-on:
      - ${{ inputs.card }}
    container:
      image: ghcr.io/tenstorrent/tt-exalens/tt-exalens-ci-ubuntu-22.04:latest
      options: --device /dev/tenstorrent
      volumes:
        - /dev/hugepages:/dev/hugepages
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /etc/udev/rules.d:/etc/udev/rules.d
        - /lib/modules:/lib/modules
        - /opt/tt_metal_infra/provisioning/provisioning_env:/opt/tt_metal_infra/provisioning/provisioning_env

    steps:
      - name: Print all params
        run: |
          ${{ inputs.log-params }}
          echo run-exalens-tests - ubuntu-docker-version: ${{ inputs.ubuntu-docker-version }}
          echo run-exalens-tests - card: ${{ inputs.card }}
          echo run-exalens-tests - build-type: ${{ inputs.build-type }}
          echo run-exalens-tests - log-level: ${{ inputs.log-level }}

      - name: Cleanup workspace directory from previous runs.
        run: |
          echo "Cleaning up working directory from previous runs: $(pwd)"
          rm -rf *

      - uses: actions/checkout@v4
        with:
          repository: tenstorrent/tt-exalens
          ref: main
          submodules: recursive
          path: ./

      - name: Get tt-exalens kernels artifact
        uses: pyTooling/download-artifact@v4
        with:
          name: ttexalens-build-${{ inputs.ubuntu-docker-version }}-${{ inputs.build-type }}
          path: ./

      - name: Use wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.WHEEL_ARTIFACT_NAME }}
          path: ./

      - name: Install UMD wheel
        shell: bash
        run: |
          pip install tt_umd-*.whl --force-reinstall

      - name: Run Python tests for tt-exalens library
        run: |
          python3 -m unittest discover -v -t . -s test/ttexalens -p *test*.py

      - name: Run Python tests for tt-exalens app
        run: |
          python3 -m unittest discover -v -t . -s test/app -p *test*.py

      # HACK: Exalens tests rapidly create/destroy UMD contexts, each of
      # which calls set_power_state(false) on destruction. In the gap
      # between tests, KMD may clock-gate tensix, making NOC1 reads to
      # 0xffb121b0 time out. We compile and run a small program that opens
      # the device in power-aware mode and holds set_power_state(true) via
      # ioctl for the duration of the NOC1 tests.
      - name: Build hold_power helper
        shell: bash
        run: |
          cat > /tmp/hold_power.c << 'CEOF'
          #include <fcntl.h>
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          #include <sys/ioctl.h>
          #include <linux/types.h>
          #include <linux/ioctl.h>
          #include <unistd.h>
          #define TENSTORRENT_IOCTL_MAGIC 0xFA
          #define TENSTORRENT_IOCTL_SET_POWER_STATE _IO(TENSTORRENT_IOCTL_MAGIC, 15)
          struct tenstorrent_power_state {
              __u32 argsz;
              __u32 flags;
              __u8 reserved0;
              __u8 validity;
              __u16 power_flags;
          };
          int main(int argc, char *argv[]) {
              int dev = argc > 1 ? atoi(argv[1]) : 0;
              char path[64];
              snprintf(path, sizeof(path), "/dev/tenstorrent/%d", dev);
              int fd = open(path, O_RDWR | O_CLOEXEC | O_APPEND);
              if (fd < 0) { perror("open"); return 1; }
              struct tenstorrent_power_state ps = {0};
              ps.argsz = sizeof(ps);
              ps.validity = (4 & 0xF);
              ps.power_flags = (1U << 1) | (1U << 2) | (1U << 3);
              if (ioctl(fd, TENSTORRENT_IOCTL_SET_POWER_STATE, &ps) < 0) {
                  perror("ioctl SET_POWER_STATE");
                  close(fd);
                  return 1;
              }
              fprintf(stderr, "Holding device %d in high power.\n", dev);
              pause();
              close(fd);
              return 0;
          }
          CEOF
          gcc -o /tmp/hold_power /tmp/hold_power.c

      - name: Run Python tests for tt-exalens library (NOC1)
        env:
          TTEXALENS_TESTS_USE_NOC1: 1
        shell: bash
        run: |
          /tmp/hold_power 0 &
          HOLD_POWER_PID=$!
          sleep 2
          python3 -m unittest discover -v -t . -s test/ttexalens -p *test*.py
          kill $HOLD_POWER_PID 2>/dev/null || true

      - name: Run Python tests for tt-exalens app (NOC1)
        env:
          TTEXALENS_TESTS_USE_NOC1: 1
        shell: bash
        run: |
          /tmp/hold_power 0 &
          HOLD_POWER_PID=$!
          sleep 2
          python3 -m unittest discover -v -t . -s test/app -p *test*.py
          kill $HOLD_POWER_PID 2>/dev/null || true
