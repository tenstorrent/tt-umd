# Run tooling tests (tt-smi etc.) on real hardware with the UMD wheel from the current branch.
name: Run Tooling Tests

on:
  workflow_call:
    inputs:
      ubuntu-docker-version:
        required: true
        type: string
      card:
        required: true
        type: string
      timeout:
        required: true
        type: number
      build-type:
        required: true
        type: string
        default: Release
      log-params:
        required: false
        type: string
        default: ""
      image-tag:
        required: false
        type: string
        default: latest
        description: 'Content-hash tag from docker-image.yml. Defaults to latest.'

env:
  WHEEL_ARTIFACT_NAME: wheel-artifact-${{ inputs.ubuntu-docker-version }}-${{ inputs.build-type }}

jobs:
  test:
    name: Test tooling (${{ inputs.card }}, ${{ inputs.ubuntu-docker-version }})
    timeout-minutes: ${{ fromJSON(inputs.timeout) }}
    runs-on:
      - ${{ inputs.card }}
    container:
      image: ghcr.io/${{ github.repository }}/tt-umd-ci-${{ inputs.ubuntu-docker-version }}:${{ inputs.image-tag }}
      options: --device /dev/tenstorrent
      volumes:
        - /dev/hugepages:/dev/hugepages
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /etc/udev/rules.d:/etc/udev/rules.d
        - /lib/modules:/lib/modules
        - /opt/tt_metal_infra/provisioning/provisioning_env:/opt/tt_metal_infra/provisioning/provisioning_env

    steps:
      - name: Print all params
        run: |
          ${{ inputs.log-params }}
          echo run-tooling-tests - ubuntu-docker-version: ${{ inputs.ubuntu-docker-version }}
          echo run-tooling-tests - card: ${{ inputs.card }}
          echo run-tooling-tests - build-type: ${{ inputs.build-type }}

      - name: Cleanup workspace directory from previous runs
        run: |
          echo "Cleaning up working directory from previous runs: $(pwd)"
          rm -rf *

      - name: Use UMD wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.WHEEL_ARTIFACT_NAME }}
          path: ./

      - name: Install tt-smi
        run: pip install "tt-smi"

      - name: Install UMD wheel
        run: pip install tt_umd-*.whl --force-reinstall

      # tt-smi -ls runs full UMD discovery (using tt-smi's own TopologyDiscoveryOptions)
      # and the full backend init (telemetry, firmware, board info), prints the board list,
      # and exits non-interactively. Picks up any future tt-smi option changes automatically.
      - name: Run tt-smi
        run: tt-smi -ls
