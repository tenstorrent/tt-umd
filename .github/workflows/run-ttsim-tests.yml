# Builds tt-metal with the newest UMD and runs ttsim tests.
# Note: Running these tests also implicitly verifies that tt-metal can be built
# against the newest UMD, since a full tt-metal build is required before any
# simulator test can execute.
name: Run ttsim tests

on:
  workflow_dispatch:
    inputs:
      timeout:
        required: true
        description: 'The timeout for the job in minutes'
        type: number
        default: 60
  workflow_call:
    inputs:
      timeout:
        required: false
        description: 'The timeout for the job in minutes'
        type: number
        default: 60

jobs:
  build-and-run-ttsim:
    # Due to parsing bug, fromJSON is used to convert string to number.
    # In pull_request or push events, the input context is not available, stating the default again here.
    timeout-minutes: ${{ fromJSON(inputs.timeout || '30') }}

    name: Build and test ttsim with newest UMD
    runs-on: tt-ubuntu-2204-large-stable
    container:
      image: ghcr.io/tenstorrent/tt-metal/tt-metalium/ubuntu-22.04-dev-amd64:latest
      env:
        # TODO: Revisit the addition of these env vars https://github.com/tenstorrent/tt-metal/issues/20161
        TRACY_NO_INVARIANT_CHECK: 1
        TRACY_NO_ISA_EXTENSIONS: 1

    steps:
      - name: Checkout tt-metal repo
        uses: actions/checkout@v6
        with:
          # Clone under tt-metal directory
          path: tt-metal
          repository: tenstorrent/tt-metal
          submodules: recursive

      - name: Checkout UMD
        uses: actions/checkout@v6
        with:
          # Clone directly into tt-metal directory for umd
          path: tt-metal/tt_metal/third_party/umd
          submodules: recursive

      - name: Download ttsim binary (wh)
        uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f  # v1.13
        with:
          repository: tenstorrent/ttsim
          latest: true
          fileName: "libttsim_wh.so"
          out-file-path: /tmp/ttsim-wh

      - name: Download ttsim binary (bh)
        uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f  # v1.13
        with:
          repository: tenstorrent/ttsim
          latest: true
          fileName: "libttsim_bh.so"
          out-file-path: /tmp/ttsim-bh

      - name: Download ttsim binary (bh_x2)
        uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f  # v1.13
        with:
          repository: tenstorrent/ttsim
          latest: true
          fileName: "libttsim_bh_x2.so"
          out-file-path: /tmp/ttsim-bh-x2

      - name: Download ttsim binary (qsr)
        uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f  # v1.13
        with:
          repository: tenstorrent/ttsim
          latest: true
          fileName: "libttsim_qsr.so"
          out-file-path: /tmp/ttsim-qsr

      - name: Download ttsim binary (wh_x2)
        uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f  # v1.13
        with:
          repository: tenstorrent/ttsim
          latest: true
          fileName: "libttsim_wh_x2.so"
          out-file-path: /tmp/ttsim-wh-x2

      - name: Build tt-metal
        run: |
          cd tt-metal
          export TT_METAL_HOME=$(pwd)
          export TT_METAL_RUNTIME_ROOT=$(pwd)
          export PYTHONPATH=$(pwd)
          echo "TT_METAL_HOME=$(pwd)" >> $GITHUB_ENV
          echo "TT_METAL_RUNTIME_ROOT=$(pwd)" >> $GITHUB_ENV
          echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV
          ./build_metal.sh --build-all --build-umd-tests --enable-ccache
          cd ../

      - name: Prepare sim paths
        run: |
          echo "Preparing sim paths"
          mkdir -p sim_wh sim_bh sim_qsr sim_wh_x2 sim_bh_x2
          mv /tmp/ttsim-wh/libttsim_wh.so sim_wh/libttsim.so
          mv /tmp/ttsim-bh/libttsim_bh.so sim_bh/libttsim.so
          mv /tmp/ttsim-qsr/libttsim_qsr.so sim_qsr/libttsim.so
          mv /tmp/ttsim-wh-x2/libttsim_wh_x2.so sim_wh_x2/libttsim.so
          mv /tmp/ttsim-bh-x2/libttsim_bh_x2.so sim_bh_x2/libttsim.so
          cp $TT_METAL_HOME/tt_metal/soc_descriptors/wormhole_b0_80_arch.yaml sim_wh/soc_descriptor.yaml
          cp $TT_METAL_HOME/tt_metal/soc_descriptors/blackhole_140_arch.yaml sim_bh/soc_descriptor.yaml
          cp tt-metal/tt_metal/third_party/umd/tests/soc_descs/quasar_32_arch.yaml sim_qsr/soc_descriptor.yaml
          # wh_x2 is two Wormhole chips; reuse the per-chip Wormhole soc descriptor.
          cp $TT_METAL_HOME/tt_metal/soc_descriptors/wormhole_b0_80_arch.yaml sim_wh_x2/soc_descriptor.yaml
          # Place the N300 cluster descriptor beside the simulator; UMD auto-discovers it (like soc_descriptor.yaml)
          # and enumerates both the MMIO gateway and the remote chip. Without it, the sim is a single MMIO chip.
          cp tt-metal/tt_metal/third_party/umd/tests/cluster_descriptor_examples/wormhole_N300.yaml \
            sim_wh_x2/cluster_descriptor.yaml
          # bh_x2 is two Blackhole chips; reuse the per-chip Blackhole soc descriptor.
          cp $TT_METAL_HOME/tt_metal/soc_descriptors/blackhole_140_arch.yaml sim_bh_x2/soc_descriptor.yaml
          # Place the P300 cluster descriptor beside the simulator; UMD auto-discovers it (like soc_descriptor.yaml)
          # and enumerates both MMIO chips. Without it, the sim is a single MMIO chip.
          cp tt-metal/tt_metal/third_party/umd/tests/cluster_descriptor_examples/blackhole_P300_both_mmio.yaml \
            sim_bh_x2/cluster_descriptor.yaml

      - name: Build UMD api_tests and microbenchmark with simulation support
        run: |
          cmake -B tt-metal/tt_metal/third_party/umd/build -G Ninja \
            -S tt-metal/tt_metal/third_party/umd \
            -DTT_UMD_BUILD_TESTS=ON \
            -DTT_UMD_BUILD_SIMULATION=ON \
            -DTT_UMD_BUILD_PYTHON=OFF \
            -DTT_UMD_BUILD_EXAMPLES=OFF \
            -DTT_UMD_BUILD_TOOLS=OFF \
            -DTT_UMD_ENABLE_CLANG_TIDY=OFF \
            -DTT_UMD_ENABLE_TRACY=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build tt-metal/tt_metal/third_party/umd/build --target api_tests umd_microbenchmark

      # Following single card tests should be really fast, only a couple of seconds each, so we set a short timeout for
      # them and if they time out, it indicates some issue with the simulator setup rather than an actual test failure.
      - name: Run tt-sim wormhole tests
        timeout-minutes: 1
        run: |
          export TT_METAL_SIMULATOR=$(pwd)/sim_wh/libttsim.so
          TT_METAL_SLOW_DISPATCH_MODE=1 $TT_METAL_HOME/build/programming_examples/metal_example_add_2_integers_in_riscv

      - name: Run tt-sim blackhole tests
        timeout-minutes: 1
        run: |
          export TT_METAL_SIMULATOR=$(pwd)/sim_bh/libttsim.so
          TT_METAL_SLOW_DISPATCH_MODE=1 $TT_METAL_HOME/build/programming_examples/metal_example_add_2_integers_in_riscv

      - name: Run UMD TestDeviceIOFixture on tt-sim wormhole
        timeout-minutes: 1
        env:
          TT_UMD_SIMULATOR: ${{ github.workspace }}/sim_wh/libttsim.so
        run: |
          tt-metal/tt_metal/third_party/umd/build/test/umd/api/api_tests --gtest_filter="TestDeviceIOFixture.*"

      - name: Run UMD TestDeviceIOFixture on tt-sim blackhole
        timeout-minutes: 1
        env:
          TT_UMD_SIMULATOR: ${{ github.workspace }}/sim_bh/libttsim.so
        run: |
          tt-metal/tt_metal/third_party/umd/build/test/umd/api/api_tests --gtest_filter="TestDeviceIOFixture.*"

      - name: Run UMD TTSimDeviceIOFixture on tt-sim wormhole
        timeout-minutes: 1
        env:
          TT_UMD_SIMULATOR: ${{ github.workspace }}/sim_wh/libttsim.so
        run: |
          tt-metal/tt_metal/third_party/umd/build/test/umd/api/api_tests --gtest_filter="TTSimDeviceIOFixture.*"

      - name: Run UMD TTSimDeviceIOFixture on tt-sim blackhole
        timeout-minutes: 1
        env:
          TT_UMD_SIMULATOR: ${{ github.workspace }}/sim_bh/libttsim.so
        run: |
          tt-metal/tt_metal/third_party/umd/build/test/umd/api/api_tests --gtest_filter="TTSimDeviceIOFixture.*"

      # bh_x2 is the P300 multichip simulator (both Blackhole chips MMIO-capable). The
      # cluster_descriptor.yaml placed beside the simulator (see "Prepare sim paths") makes UMD
      # enumerate both chips, so the standard device-IO fixtures run across both MMIO chips and the
      # simulated inter-chip eth links. The P300 host-DMA routing programs the outbound iATU via BAR2,
      # which the stable ttsim release models.
      - name: Run UMD TestDeviceIOFixture on tt-sim blackhole x2
        timeout-minutes: 1
        env:
          TT_UMD_SIMULATOR: ${{ github.workspace }}/sim_bh_x2/libttsim.so
        run: |
          tt-metal/tt_metal/third_party/umd/build/test/umd/api/api_tests --gtest_filter="TestDeviceIOFixture.*"

      - name: Run UMD TTSimDeviceIOFixture on tt-sim blackhole x2
        timeout-minutes: 1
        env:
          TT_UMD_SIMULATOR: ${{ github.workspace }}/sim_bh_x2/libttsim.so
        run: |
          tt-metal/tt_metal/third_party/umd/build/test/umd/api/api_tests --gtest_filter="TTSimDeviceIOFixture.*"

      - name: Run UMD TestDeviceIOFixture on tt-sim quasar
        timeout-minutes: 1
        env:
          TT_UMD_SIMULATOR: ${{ github.workspace }}/sim_qsr/libttsim.so
        run: |
          tt-metal/tt_metal/third_party/umd/build/test/umd/api/api_tests --gtest_filter="TestDeviceIOFixture.*"

      - name: Run UMD TTSimDeviceIOFixture on tt-sim quasar
        timeout-minutes: 1
        env:
          TT_UMD_SIMULATOR: ${{ github.workspace }}/sim_qsr/libttsim.so
        run: |
          tt-metal/tt_metal/third_party/umd/build/test/umd/api/api_tests --gtest_filter="TTSimDeviceIOFixture.*"

      # wh_x2 is the N300 multichip simulator (chip 0 MMIO gateway + chip 1 remote over
      # simulated eth). The cluster_descriptor.yaml placed beside the simulator (see "Prepare sim paths")
      # makes UMD enumerate both chips, so the standard device-IO fixtures run across the gateway and
      # the remote chip.
      - name: Run UMD TestDeviceIOFixture on tt-sim wormhole x2
        timeout-minutes: 1
        env:
          TT_UMD_SIMULATOR: ${{ github.workspace }}/sim_wh_x2/libttsim.so
        run: |
          tt-metal/tt_metal/third_party/umd/build/test/umd/api/api_tests --gtest_filter="TestDeviceIOFixture.*"

      - name: Run UMD TTSimDeviceIOFixture on tt-sim wormhole x2
        timeout-minutes: 1
        env:
          TT_UMD_SIMULATOR: ${{ github.workspace }}/sim_wh_x2/libttsim.so
        run: |
          tt-metal/tt_metal/third_party/umd/build/test/umd/api/api_tests --gtest_filter="TTSimDeviceIOFixture.*"

      - name: Install microbenchmark python deps
        run: |
          python3 -m ensurepip --upgrade
          python3 -m pip install --no-cache-dir pandas psutil

      - name: Run UMD simulator microbenchmarks (wormhole)
        timeout-minutes: 2
        env:
          TT_UMD_SIMULATOR: ${{ github.workspace }}/sim_wh/libttsim.so
          UMD_MICROBENCHMARK_RESULTS_PATH: /tmp/umd_bench_sim_wh
        run: |
          mkdir -p "$UMD_MICROBENCHMARK_RESULTS_PATH"
          tt-metal/tt_metal/third_party/umd/build/test/umd/microbenchmark/umd_microbenchmark \
            --gtest_filter='MicrobenchmarkSim*'
          python3 tt-metal/tt_metal/third_party/umd/tests/microbenchmark/tools/gather_host_specs.py \
            --board-type sim-wh --json --output "$UMD_MICROBENCHMARK_RESULTS_PATH/machine_host_spec"

      - name: Upload wormhole simulator benchmark JSON
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-json-sim-wh
          path: /tmp/umd_bench_sim_wh/*.json
          if-no-files-found: error

      - name: Run UMD simulator microbenchmarks (blackhole)
        timeout-minutes: 2
        env:
          TT_UMD_SIMULATOR: ${{ github.workspace }}/sim_bh/libttsim.so
          UMD_MICROBENCHMARK_RESULTS_PATH: /tmp/umd_bench_sim_bh
        run: |
          mkdir -p "$UMD_MICROBENCHMARK_RESULTS_PATH"
          tt-metal/tt_metal/third_party/umd/build/test/umd/microbenchmark/umd_microbenchmark \
            --gtest_filter='MicrobenchmarkSim*'
          python3 tt-metal/tt_metal/third_party/umd/tests/microbenchmark/tools/gather_host_specs.py \
            --board-type sim-bh --json --output "$UMD_MICROBENCHMARK_RESULTS_PATH/machine_host_spec"

      - name: Upload blackhole simulator benchmark JSON
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-json-sim-bh
          path: /tmp/umd_bench_sim_bh/*.json
          if-no-files-found: error

      - name: Run UMD simulator microbenchmarks (quasar)
        timeout-minutes: 2
        env:
          TT_UMD_SIMULATOR: ${{ github.workspace }}/sim_qsr/libttsim.so
          UMD_MICROBENCHMARK_RESULTS_PATH: /tmp/umd_bench_sim_qsr
        run: |
          mkdir -p "$UMD_MICROBENCHMARK_RESULTS_PATH"
          tt-metal/tt_metal/third_party/umd/build/test/umd/microbenchmark/umd_microbenchmark \
            --gtest_filter='MicrobenchmarkSim*'
          python3 tt-metal/tt_metal/third_party/umd/tests/microbenchmark/tools/gather_host_specs.py \
            --board-type sim-qsr --json --output "$UMD_MICROBENCHMARK_RESULTS_PATH/machine_host_spec"

      - name: Upload quasar simulator benchmark JSON
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-json-sim-qsr
          path: /tmp/umd_bench_sim_qsr/*.json
          if-no-files-found: error

      # Galaxy tests can be a bit longer, should run on the order of minutes.
      - name: Run tt-metal C++ unit test on tt-sim galaxy wormhole_b0
        timeout-minutes: 5
        env:
          TT_METAL_SIMULATOR_HOME: ${{ github.workspace }}/sim_wh
          TT_METAL_SIMULATOR: ${{ github.workspace }}/sim_wh/libttsim.so
          TT_METAL_SLOW_DISPATCH_MODE: 1
          TT_METAL_TESTS_DIR: >-
            ${{ github.workspace }}/tt-metal/tt_metal/third_party/tt-cluster-descriptors/wormhole/6u_cluster_desc
        run: |
          cd tt-metal
          export TT_METAL_MOCK_CLUSTER_DESC_PATH="${TT_METAL_TESTS_DIR}/6u_cluster_desc.yaml"
          echo "Running C++ unit tests for wormhole_b0..."
          ./build/test/tt_metal/unit_tests_api --gtest_filter="*StreamRegWrite*"
          ./build/test/tt_metal/unit_tests_api --gtest_filter="*InlineWrite*"

      - name: Run tt-metal C++ unit test on tt-sim galaxy blackhole
        timeout-minutes: 5
        env:
          TT_METAL_SIMULATOR_HOME: ${{ github.workspace }}/sim_bh
          TT_METAL_SIMULATOR: ${{ github.workspace }}/sim_bh/libttsim.so
          TT_METAL_SLOW_DISPATCH_MODE: 1
          TT_METAL_TESTS_DIR: >-
            ${{ github.workspace }}/tt-metal/tt_metal/third_party/tt-cluster-descriptors/blackhole/bh_6u_cluster_desc
        run: |
          cd tt-metal
          export TT_METAL_MOCK_CLUSTER_DESC_PATH="${TT_METAL_TESTS_DIR}/bh_6u_cluster_desc.yaml"
          echo "Running C++ unit tests for blackhole..."
          ./build/test/tt_metal/unit_tests_api --gtest_filter="*StreamRegWrite*"
          ./build/test/tt_metal/unit_tests_api --gtest_filter="*InlineWrite*"

  # UMD-only ttsim coverage on aarch64. tt-metal is intentionally NOT built here:
  # tt-metal does not publish an arm64 dev image, so instead of the full
  # tt-metal-on-arm coverage we get on x86_64, this leg exercises UMD's own
  # simulator device-IO fixtures against the aarch64 ttsim binaries. It runs
  # natively on an arm64 runner inside UMD's arm64 CI image (published by
  # build-device.yml's ensure-ubuntu-2404-arm-image job) and sources SoC
  # descriptors from UMD's own tree instead of a tt-metal checkout.
  build-and-run-ttsim-aarch64:
    # Due to parsing bug, fromJSON is used to convert string to number.
    timeout-minutes: ${{ fromJSON(inputs.timeout || '30') }}

    name: Build UMD and run ttsim tests (aarch64)
    runs-on: ubuntu-24.04-arm
    container:
      image: ghcr.io/${{ github.repository }}/tt-umd-ci-ubuntu-24.04-arm:latest

    steps:
      - name: Checkout UMD
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Download ttsim binary (wh)
        uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f  # v1.13
        with:
          repository: tenstorrent/ttsim
          latest: true
          fileName: "libttsim_wh_aarch64.so"
          out-file-path: /tmp/ttsim-wh

      - name: Download ttsim binary (bh)
        uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f  # v1.13
        with:
          repository: tenstorrent/ttsim
          latest: true
          fileName: "libttsim_bh_aarch64.so"
          out-file-path: /tmp/ttsim-bh

      - name: Download ttsim binary (qsr)
        uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f  # v1.13
        with:
          repository: tenstorrent/ttsim
          latest: true
          fileName: "libttsim_qsr_aarch64.so"
          out-file-path: /tmp/ttsim-qsr

      - name: Download ttsim binary (wh_x2)
        uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f  # v1.13
        with:
          repository: tenstorrent/ttsim
          latest: true
          fileName: "libttsim_wh_x2_aarch64.so"
          out-file-path: /tmp/ttsim-wh-x2

      - name: Prepare sim paths
        run: |
          echo "Preparing sim paths"
          mkdir -p sim_wh sim_bh sim_qsr sim_wh_x2
          mv /tmp/ttsim-wh/libttsim_wh_aarch64.so sim_wh/libttsim.so
          mv /tmp/ttsim-bh/libttsim_bh_aarch64.so sim_bh/libttsim.so
          mv /tmp/ttsim-qsr/libttsim_qsr_aarch64.so sim_qsr/libttsim.so
          mv /tmp/ttsim-wh-x2/libttsim_wh_x2_aarch64.so sim_wh_x2/libttsim.so
          # No tt-metal checkout on aarch64, so source the SoC descriptors from UMD's
          # own tree. wormhole_b0_8x10 is the full-grid descriptor equivalent to
          # tt-metal's wormhole_b0_80_arch; blackhole_140_arch and quasar_32_arch are
          # the same files used on x86_64.
          cp tests/soc_descs/wormhole_b0_8x10.yaml sim_wh/soc_descriptor.yaml
          cp tests/soc_descs/blackhole_140_arch.yaml sim_bh/soc_descriptor.yaml
          cp tests/soc_descs/quasar_32_arch.yaml sim_qsr/soc_descriptor.yaml
          # wh_x2 is two Wormhole chips; reuse the per-chip Wormhole soc descriptor.
          cp tests/soc_descs/wormhole_b0_8x10.yaml sim_wh_x2/soc_descriptor.yaml
          # Place the N300 cluster descriptor beside the simulator; UMD auto-discovers it (like
          # soc_descriptor.yaml) and enumerates both the MMIO gateway and the remote chip.
          cp tests/cluster_descriptor_examples/wormhole_N300.yaml sim_wh_x2/cluster_descriptor.yaml

      - name: Build UMD api_tests with simulation support
        run: |
          cmake -B build -G Ninja \
            -S . \
            -DTT_UMD_BUILD_TESTS=ON \
            -DTT_UMD_BUILD_SIMULATION=ON \
            -DTT_UMD_BUILD_PYTHON=OFF \
            -DTT_UMD_BUILD_EXAMPLES=OFF \
            -DTT_UMD_BUILD_TOOLS=OFF \
            -DTT_UMD_ENABLE_CLANG_TIDY=OFF \
            -DTT_UMD_ENABLE_TRACY=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target api_tests

      - name: Run UMD TestDeviceIOFixture on tt-sim wormhole
        timeout-minutes: 1
        env:
          TT_UMD_SIMULATOR: ${{ github.workspace }}/sim_wh/libttsim.so
        run: |
          build/test/umd/api/api_tests --gtest_filter="TestDeviceIOFixture.*"

      - name: Run UMD TestDeviceIOFixture on tt-sim blackhole
        timeout-minutes: 1
        env:
          TT_UMD_SIMULATOR: ${{ github.workspace }}/sim_bh/libttsim.so
        run: |
          build/test/umd/api/api_tests --gtest_filter="TestDeviceIOFixture.*"

      - name: Run UMD TTSimDeviceIOFixture on tt-sim wormhole
        timeout-minutes: 1
        env:
          TT_UMD_SIMULATOR: ${{ github.workspace }}/sim_wh/libttsim.so
        run: |
          build/test/umd/api/api_tests --gtest_filter="TTSimDeviceIOFixture.*"

      - name: Run UMD TTSimDeviceIOFixture on tt-sim blackhole
        timeout-minutes: 1
        env:
          TT_UMD_SIMULATOR: ${{ github.workspace }}/sim_bh/libttsim.so
        run: |
          build/test/umd/api/api_tests --gtest_filter="TTSimDeviceIOFixture.*"

      - name: Run UMD TestDeviceIOFixture on tt-sim quasar
        timeout-minutes: 1
        env:
          TT_UMD_SIMULATOR: ${{ github.workspace }}/sim_qsr/libttsim.so
        run: |
          build/test/umd/api/api_tests --gtest_filter="TestDeviceIOFixture.*"

      - name: Run UMD TTSimDeviceIOFixture on tt-sim quasar
        timeout-minutes: 1
        env:
          TT_UMD_SIMULATOR: ${{ github.workspace }}/sim_qsr/libttsim.so
        run: |
          build/test/umd/api/api_tests --gtest_filter="TTSimDeviceIOFixture.*"

      # wh_x2 is the N300 multichip simulator (chip 0 MMIO gateway + chip 1 remote over
      # simulated eth). The cluster_descriptor.yaml placed beside the simulator (see "Prepare sim paths")
      # makes UMD enumerate both chips, so the standard device-IO fixtures run across the gateway and
      # the remote chip.
      - name: Run UMD TestDeviceIOFixture on tt-sim wormhole x2
        timeout-minutes: 1
        env:
          TT_UMD_SIMULATOR: ${{ github.workspace }}/sim_wh_x2/libttsim.so
        run: |
          build/test/umd/api/api_tests --gtest_filter="TestDeviceIOFixture.*"

      - name: Run UMD TTSimDeviceIOFixture on tt-sim wormhole x2
        timeout-minutes: 1
        env:
          TT_UMD_SIMULATOR: ${{ github.workspace }}/sim_wh_x2/libttsim.so
        run: |
          build/test/umd/api/api_tests --gtest_filter="TTSimDeviceIOFixture.*"

  # Compare the simulator microbenchmark results against the per-arch baselines in
  # tests/microbenchmark/baselines/sim-*.yaml.
  regression-check:
    secrets: inherit
    needs: build-and-run-ttsim
    if: ${{ needs.build-and-run-ttsim.result == 'success' }}
    permissions:
      contents: read
      packages: read
      actions: read
    uses: ./.github/workflows/regression-check.yml
