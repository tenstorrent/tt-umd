name: Test self-hosted runner (bgd-lab-06)

on:
  workflow_dispatch:
    inputs:
      sleep_seconds:
        description: 'How long to occupy the runner (seconds)'
        required: false
        default: '300'
  push:
    branches:
      - ajovanovic/dedicated_machine_reservation_script

jobs:
  occupy:
    runs-on: [self-hosted, bgd-lab-06]
    steps:
      - name: Identify
        run: |
          echo "Running on: $(hostname)"
          echo "User:       $(whoami)"
          echo "Worker PID: $$"
          pgrep -af 'Runner\.Worker' || true
      - name: Sleep
        env:
          SLEEP_SECONDS: ${{ inputs.sleep_seconds || '300' }}
        run: |
          echo "Sleeping for ${SLEEP_SECONDS} seconds..."
          sleep "${SLEEP_SECONDS}"
          echo "Done."
